name: Financial Ponds Daily

on:
  workflow_dispatch:
    inputs:
      as_of:
        description: "Historical business date (YYYY-MM-DD); blank uses Hong Kong today"
        required: false
        type: string
      replay_mode:
        description: "live, historical_fetch, or offline_snapshot"
        required: false
        default: live
        type: choice
        options: [live, historical_fetch, offline_snapshot]
  schedule:
    # 16:45 Asia/Hong_Kong, after the A-share close and provider refresh window.
    - cron: "45 8 * * 1-5"

jobs:
  collect-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
    env:
      TZ: Asia/Hong_Kong
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FP_MARKET_RESEARCH_MODEL: ${{ vars.FP_MARKET_RESEARCH_MODEL || 'gpt-5.6-terra' }}
      FP_MARKET_RESEARCH_REASONING: ${{ vars.FP_MARKET_RESEARCH_REASONING || 'medium' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install site dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Install A-share provider dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r tools/financial-pond-framework/providers/requirements.txt

      - name: Set daily time context
        run: |
          set -euo pipefail
          AS_OF="${{ inputs.as_of }}"
          if [[ -z "$AS_OF" ]]; then AS_OF="$(TZ=Asia/Hong_Kong date +%F)"; fi
          GENERATED_AT="$(TZ=UTC date +%Y-%m-%dT%H:%M:%SZ)"
          echo "AS_OF=$AS_OF" >> "$GITHUB_ENV"
          echo "GENERATED_AT=$GENERATED_AT" >> "$GITHUB_ENV"
          echo "REVIEW_NOW=${AS_OF}T16:00:00+08:00" >> "$GITHUB_ENV"

      - name: Run Financial Ponds A-share daily cycle
        working-directory: tools/financial-pond-framework
        run: |
          set -euo pipefail
          npm test
          npm run provider:akshare:doctor
          npm run a-share:daily:ci -- --as-of "$AS_OF"
          npm run pool:analysis -- --as-of "$AS_OF"
          npm run data:vault -- --as-of "$AS_OF"
          npm run data:audit -- --as-of "$AS_OF"
          npm run daily:sector-analysis -- --as-of "$AS_OF"
          npm run signal:attribution -- --as-of "$AS_OF"
          npm run watchlist:state -- --as-of "$AS_OF"
          npm run decision:gates -- --as-of "$AS_OF"
          npm run project:maturity -- --as-of "$AS_OF"
          npm run index:explain -- --as-of "$AS_OF"
          npm run observation:snapshot -- --as-of "$AS_OF"
          npm run data:vault -- --as-of "$AS_OF"
          npm run export:web-data -- "$AS_OF"
          cp web/data/dashboard.json ../../financial-pond/data/dashboard.json
          cp "model_outputs/$AS_OF/general_pool_analysis.json" ../../financial-pond/data/general_pool_analysis.json
          cp "model_outputs/$AS_OF/sector_flow_review.json" ../../financial-pond/data/sector_flow_review.json
          cp "model_outputs/$AS_OF/sector_rotation_intelligence.json" ../../financial-pond/data/sector_rotation_intelligence.json
          cp "model_outputs/$AS_OF/sector_rotation_history.json" ../../financial-pond/data/sector_rotation_history.json
          cp "model_outputs/$AS_OF/sector_module_review.json" ../../financial-pond/data/sector_module_review.json
          cp "model_outputs/$AS_OF/etf_decision_readiness.json" ../../financial-pond/data/etf_decision_readiness.json
          cp "model_outputs/$AS_OF/data_reality_audit.json" ../../financial-pond/data/data_reality_audit.json
          cp "model_outputs/$AS_OF/daily_sector_analysis.json" ../../financial-pond/data/daily_sector_analysis.json
          cp "model_outputs/$AS_OF/module_maturity_audit.json" ../../financial-pond/data/module_maturity_audit.json
          cp "model_outputs/$AS_OF/etf_flow_leaderboard.json" ../../financial-pond/data/etf_flow_leaderboard.json
          cp "model_outputs/$AS_OF/sector_signal_attribution.json" ../../financial-pond/data/sector_signal_attribution.json
          cp "model_outputs/$AS_OF/sector_watchlist_state.json" ../../financial-pond/data/sector_watchlist_state.json
          cp "model_outputs/$AS_OF/decision_gate_ledger.json" ../../financial-pond/data/decision_gate_ledger.json
          cp "model_outputs/$AS_OF/index_explainability.json" ../../financial-pond/data/index_explainability.json
          cp "model_outputs/$AS_OF/observation_snapshot.json" ../../financial-pond/data/observation_snapshot.json
          cp "model_outputs/$AS_OF/daily_data_vault.json" ../../financial-pond/data/daily_data_vault.json
          cp "model_outputs/$AS_OF/news_review.json" ../../financial-pond/data/news_review.json

      - name: Archive normalized market inputs
        if: always()
        working-directory: tools/financial-pond-framework
        run: |
          set -euo pipefail
          if [[ "${{ inputs.replay_mode }}" == "offline_snapshot" ]]; then
            npm run provider:history:archive -- --as-of "$AS_OF" --offline
          elif [[ "${{ inputs.replay_mode }}" == "historical_fetch" ]]; then
            npm run provider:history:archive -- --as-of "$AS_OF" --refresh-inputs --strict-exact-date
          else
            npm run provider:history:archive -- --as-of "$AS_OF"
          fi

      - name: Upload replayable market inputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fp-market-inputs-${{ env.AS_OF }}
          path: financial-pond/history/market-inputs/${{ env.AS_OF }}
          if-no-files-found: warn
          retention-days: 14

      - name: Build daily persistence
        run: |
          set -euo pipefail
          npm run fp:daily

      - name: Build AI market penetration (display only)
        run: |
          set -euo pipefail
          npm run fp:research

      - name: Build site and Worker
        run: |
          set -euo pipefail
          npm run build:site

      - name: Validate Worker artifact
        run: |
          set -euo pipefail
          npm run validate

      - name: Validate published data
        run: |
          set -euo pipefail
          npm run validate:data

      - name: Run tests
        run: |
          set -euo pipefail
          npm test

      - name: Upload derived Financial Ponds data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fp-derived-${{ env.AS_OF }}
          path: |
            financial-pond/data
            reports/market-penetration/${{ env.AS_OF }}.md
            tools/financial-pond-framework/model_outputs/${{ env.AS_OF }}
          retention-days: 14

      - name: Persist published data
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add financial-pond/data
          if [[ -f "reports/market-penetration/${AS_OF}.md" ]]; then
            git add "reports/market-penetration/${AS_OF}.md"
          fi
          git add tools/financial-pond-framework/data/provider_exports/*.csv
          git add tools/financial-pond-framework/data/provider_exports/daily/*.json
          if [[ -f tools/financial-pond-framework/data/provider_exports/a_share_benchmark_daily.json ]]; then
            git add tools/financial-pond-framework/data/provider_exports/a_share_benchmark_daily.json
          fi
          git add tools/financial-pond-framework/model_outputs/provider_runs/akshare_etf_bridge_*.json
          if compgen -G "tools/financial-pond-framework/model_outputs/provider_runs/a_share_benchmark_history_*.json" > /dev/null; then
            git add tools/financial-pond-framework/model_outputs/provider_runs/a_share_benchmark_history_*.json
          fi
          git add tools/financial-pond-framework/model_outputs/provider_validation/akshare_etf_bridge_validation.json
          git add tools/financial-pond-framework/model_outputs/provider_inspection/akshare_etf_bridge_inspection.json
          git add tools/financial-pond-framework/model_outputs/provider_inspection/akshare_etf_bridge_inspection.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(data): update financial ponds daily data"
            git push
          else
            echo "No data changes to commit"
          fi

      - name: Deploy to Cloudflare
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        run: |
          set -euo pipefail
          npx wrangler@4.102.0 deploy
